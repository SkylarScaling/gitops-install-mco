---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mco-init-job
  namespace: open-cluster-management-observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mco-init-role
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "create", "patch", "update"]
  - apiGroups: ["objectbucket.io"]
    resources: ["objectbucketclaims"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mco-init-binding
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mco-init-role
subjects:
  - kind: ServiceAccount
    name: mco-init-job
    namespace: open-cluster-management-observability

---
apiVersion: batch/v1
kind: Job
metadata:
  name: mco-init-job
  namespace: open-cluster-management-observability
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: mco-init-job
      restartPolicy: OnFailure
      containers:
        - name: mco-init
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for ODF to provision the S3 bucket..."
              until [ "$(oc get obc observability-acm-s3 -n open-cluster-management-observability -o jsonpath='{.status.phase}')" == "Bound" ]; do
                echo "Still waiting for OBC to be Bound..."
                sleep 5
              done
              
              echo "Extracting S3 credentials from ODF..."
              BUCKET_HOST=$(oc get configmap observability-acm-s3 -n open-cluster-management-observability -o jsonpath='{.data.BUCKET_HOST}')
              BUCKET_PORT=$(oc get configmap observability-acm-s3 -n open-cluster-management-observability -o jsonpath='{.data.BUCKET_PORT}')
              BUCKET_NAME=$(oc get configmap observability-acm-s3 -n open-cluster-management-observability -o jsonpath='{.data.BUCKET_NAME}')
              AWS_ACCESS_KEY_ID=$(oc get secret observability-acm-s3 -n open-cluster-management-observability -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
              AWS_SECRET_ACCESS_KEY=$(oc get secret observability-acm-s3 -n open-cluster-management-observability -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)
              
              echo "Generating Thanos Secret..."
              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: thanos-object-storage
                namespace: open-cluster-management-observability
              type: Opaque
              stringData:
                thanos.yaml: |
                  type: s3
                  config:
                    bucket: $BUCKET_NAME
                    endpoint: https://$BUCKET_HOST:$BUCKET_PORT
                    insecure: true
                    access_key: $AWS_ACCESS_KEY_ID
                    secret_key: $AWS_SECRET_ACCESS_KEY
              EOF
              
              echo "Copying Global Pull Secret for MCO..."
              DOCKER_CONFIG_JSON=$(oc extract secret/pull-secret -n openshift-config --to=-)
              oc create secret generic multiclusterhub-operator-pull-secret \
                -n open-cluster-management-observability \
                --from-literal=.dockerconfigjson="$DOCKER_CONFIG_JSON" \
                --type=kubernetes.io/dockerconfigjson \
                --dry-run=client -o yaml | oc apply -f -
              
              echo "Initialization Complete!"